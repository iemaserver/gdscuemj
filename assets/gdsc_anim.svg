<svg xmlns="http://www.w3.org/2000/svg" id="GDSC" data-name="GDSC" version="1.1" viewBox="0 0 950.62 464.86"><style type="text/css">@import url(https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&amp;display=swap);@import url(https://fonts.googleapis.com/css2?family=Noto+Sans+Display:wght@300;400;500;600;700&amp;display=swap);@import url(https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@400;500;600;700&amp;display=swap);@import url(https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&amp;display=swap);@keyframes clip_path{0%{clip-path:inset(0 100% 0 0)}50%{clip-path:inset(0 0 0 0)}to{clip-path:inset(0 0 0 100%)}}@keyframes line_forward{to{stroke-dashoffset:0}}@keyframes line_reverse{to{stroke-dashoffset:640}}*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth}html{font-size:62.5%}@media (max-width:992px){html{font-size:60%}}@media (max-width:768px){html{font-size:55%}}body{background:var(--darkwhite);font-family:var(--mainfont);background:var(--lightwhite)}:root{--darkblack:#3c434e;--lightblack:#495464;--offblack:#32456b;--darkwhite:#ffffff;--lightwhite:#f7fafc;--lightgrey:#9ba4b4;--darkgrey:#787a91;--primaryred:#f74037;--primaryblue:#4a90f4;--primarygreen:#14b25f;--primaryyellow:#ffb808;--mainfont:&quot;Poppins&quot;, sans-serif;--primaryfont_sans:&quot;Noto Sans Display&quot;, sans-serif;--primaryfont_serif:&quot;Noto Serif&quot;, serif;--primaryfont_mono:&quot;Noto Sans Mono&quot;, monospace;--customcolor:#6f6bfa;--customfont: }::-webkit-scrollbar{width:8px;height:8px;background:0 0}::-webkit-scrollbar-thumb{background:var(--lightblack);border-radius:2px}::selection{color:var(--darkwhite);background:var(--customcolor)}.noselect,a,button,img{user-select:none;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none}a.btn:active,a.btn:focus,button.btn:active,button.btn:focus{box-shadow:none}section#banner,section#banner div.banner{position:relative;padding:2rem;display:flex;justify-content:center;align-items:center;width:100%}section#banner{height:100vh;background:var(--lightwhite) url(../images/landing1.jpeg) fixed no-repeat 50% 50%/cover}section#banner div.banner{margin:1rem;flex-direction:column;height:100%;background:0 0;border-radius:10px;z-index:1}section#banner div.banner::before{content:&quot;&quot;;position:absolute;width:100%;height:100%;backdrop-filter:blur(6px);background:rgba(255,255,255,.25);box-shadow:0 8px 16px rgba(50,69,107,.25);border-radius:10px;z-index:-1;opacity:0;visibility:hidden;transition:all .3s ease;transition-delay:1s}section#banner div.banner object{margin:2rem auto;width:50rem;height:auto;user-select:none}section#banner div.banner h1,section#banner div.banner h2{position:relative;margin:1rem auto;display:flex;justify-content:center;align-items:center}section#banner div.banner h1 span{font-size:8rem;font-weight:600;font-family:&quot;Aware&quot;,var(--mainfont);color:var(--offblack);-webkit-text-stroke:1px var(--offblack);text-align:center;clip-path:inset(0 100% 0 0);transition:all .6s cubic-bezier(.76,0,.24,1);transition-delay:.6s}section#banner div.banner h2 span,section#banner div.banner h4{font-weight:600;font-family:var(--primaryfont_serif);color:var(--lightblack);letter-spacing:.5px;text-align:center}section#banner div.banner h2 span{font-size:3.5rem;clip-path:inset(0 100% 0 0);transition:all .6s cubic-bezier(.76,0,.24,1);transition-delay:1s}section#banner div.banner h1 div.clipBg,section#banner div.banner h2 div.clipBg{position:absolute;width:100%;height:100%;border-radius:6px;clip-path:inset(0 100% 0 0)}section#banner div.banner h4{margin:.5rem auto;font-size:4rem;transform:scale(0);transition:all .6s cubic-bezier(.34,1.56,.61,.97)}section#banner div.banner a.btn_start{margin:2rem auto;padding:.6rem 3.2rem;font-size:2.5rem;font-weight:600;font-family:var(--primaryfont_sans);color:var(--darkwhite);background:var(--darkblack);box-shadow:0 8px 10px rgba(0,0,0,.1);border-radius:6px;letter-spacing:.5px;transform:scale(0);transition:transform .6s cubic-bezier(.34,1.56,.61,.97);transition-delay:.8s}section#banner div.banner.loaded::before{opacity:1;visibility:visible}section#banner div.banner.loaded h1 span,section#banner div.banner.loaded h2 span{clip-path:inset(0 0 0 0)}section#banner div.banner.loaded h1 div.clipBg{background:var(--primaryred);animation:clip_path .8s cubic-bezier(.87,0,.13,1) forwards 0s}section#banner div.banner.loaded h2 div.clipBg{background:var(--primarygreen);animation:clip_path .8s cubic-bezier(.87,0,.13,1) forwards .4s}section#banner div.banner.loaded a.btn_start,section#banner div.banner.loaded h4{transform:scale(1)}@media (max-width:1240px){section#banner div.banner object{width:40rem}section#banner div.banner h1 span{font-size:7rem}}@media (max-width:768px){section#banner div.banner object{width:30rem}section#banner div.banner h1 span{font-size:6rem}section#banner div.banner h2 span{font-size:3rem}section#banner div.banner h4{font-size:3.5rem}}@media (max-width:472px){section#banner div.banner object{width:20rem}section#banner div.banner h1 span{margin:2rem auto;font-size:5rem}section#banner div.banner h2 span{margin:1.5rem auto;font-size:2.5rem}section#banner div.banner h4{margin:1.5rem auto;font-size:3rem}section#banner div.banner a.btn_start{margin:2rem auto;font-size:2.2rem}}svg#GDSC{visibility:hidden}svg#GDSC.loaded{visibility:visible}svg#GDSC.loaded line{fill:none;stroke-linecap:round;stroke-width:140px}svg#GDSC.loaded line:nth-child(1),svg#GDSC.loaded line:nth-child(2){stroke:var(--primaryyellow);stroke-dasharray:320;stroke-dashoffset:320;animation:line_forward .4s ease forwards .6s}svg#GDSC.loaded line:nth-child(2){stroke:var(--primarygreen);animation:line_reverse .4s ease forwards 0s}svg#GDSC.loaded line:nth-child(3),svg#GDSC.loaded line:nth-child(4){stroke:var(--primaryred);stroke-dasharray:320;stroke-dashoffset:320;animation:line_forward .4s ease forwards .6s}svg#GDSC.loaded line:nth-child(4){stroke:var(--primaryblue);animation:line_reverse .4s ease forwards 0s}</style><script>window.addEventListener(&quot;load&quot;, () =&gt; { var svg = document.querySelector(&apos;svg&apos;); setTimeout(() =&gt; { svg.setAttribute(&quot;class&quot;, &quot;loaded&quot;); }, 1000); });</script><title>GDSC Logo</title><g id="Logo"><line id="Yellow_Line" x1="875.62" x2="598" y1="232.57" y2="389.86" data-name="Yellow Line"/><line id="Green_Line" x1="875.62" x2="607.08" y1="232.57" y2="75" data-name="Green Line"/><line id="Red_Line" x1="75" x2="343.54" y1="232.57" y2="75" data-name="Red Line"/><line id="Blue_Line" x1="75" x2="352.62" y1="232.57" y2="389.86" data-name="Blue Line"/></g></svg>